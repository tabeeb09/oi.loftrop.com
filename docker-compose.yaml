services:
  app:
    image: my-app:latest
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    networks: [web]

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [web]
    depends_on: [app]

networks:
  web:

volumes:
  caddy_data:
  caddy_config: